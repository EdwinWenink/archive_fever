{{ define "main" }}
  <div>
  <h1>{{ .Title }}</h1>

    {{ .Content }}

    <p>{{ len .Pages }} entries:</p>
    <div class="zettel-hidden">
    <div style="display: inline-block; font-size:13pt; max-width: 100%;
        word-wrap: break-word; word-break: break-all; line-height: 1.5em;">
    {{ range .Pages }}
        <a href="{{ .Page.Permalink }}" class="zettel-tag">{{ trim (.Page.File.BaseFileName | humanize | lower) "1234567890" }}</a>
    {{ end}}
    </div>
    </div>

  </div>
{{ end }}
