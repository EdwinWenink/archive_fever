baseURL = "https://www.edwinwenink.xyz/"
languageCode = "en-us"
title = "Archive Fever by Edwin Wenink"
googleAnalytics = "UA-117420879-1"
pygmentuseclasses = true
github_username = "EdwinWenink"
relativeURLs = true
disablePathToLower = false
enableGitInfo = true
paginate = 5

[taxonomies]
  tag = "tags"
  series = "series"

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true

[params]
    github = "https://github.com/EdwinWenink/personal_website/"
    # Security: recaptcha_sitekey and staticman_api are now loaded from environment variables
    # See config.local.toml.example for local development setup

[security]
  [security.funcs]
    getenv = ['^HUGO_', '^CI$', '^RECAPTCHA_SITEKEY$', '^STATICMAN_API$']

[menu]
[[menu.main]]
    identifier = 'cv'
    name = 'cv'
    url = 'https://raw.githubusercontent.com/EdwinWenink/cv/main/cv.pdf'
    target = "_blank"
